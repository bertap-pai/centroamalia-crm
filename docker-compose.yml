version: '3.9'

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: crm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/crm
      PORT: '3000'
      NODE_ENV: development
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET:-dev-secret-change-me}
      ALLOWED_EMAIL_DOMAIN: ${ALLOWED_EMAIL_DOMAIN:-centroamalia.com}
      API_URL: ${API_URL:-http://localhost:3000}
      WEB_URL: ${WEB_URL:-http://localhost:5173}
    ports:
      - '3000:3000'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - '5173:5173'

  pg-backup:
    image: postgres:16
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: postgres
    volumes:
      - pg_backups:/backups
    entrypoint: >
      sh -c "
        while true; do
          FILENAME=/backups/crm_$$(date +%Y%m%d_%H%M%S).dump;
          pg_dump -h postgres -U postgres -d crm -F c -f $$FILENAME;
          echo \"Backup written: $$FILENAME\";
          find /backups -name '*.dump' -mtime +7 -delete;
          sleep 86400;
        done
      "

volumes:
  postgres_data:
  pg_backups:
